<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dividir Gastos</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6ec;
    --card: #fff;
    --accent: #ff6b6b;
    --accent2: #ffd93d;
    --accent3: #6bcb77;
    --accent4: #4d96ff;
    --text: #2d2d2d;
    --muted: #999;
    --shadow: 0 8px 32px rgba(0,0,0,0.10);
    --radius: 20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text);
    padding: 30px 20px 60px;
    background-image: radial-gradient(circle at 10% 20%, #ffe0e0 0%, transparent 40%),
                      radial-gradient(circle at 90% 80%, #d0f0ff 0%, transparent 40%);
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 2.6rem;
    text-align: center;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-shadow: 3px 3px 0 #ffd93d;
  }

  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 1rem;
    margin-bottom: 36px;
    font-weight: 600;
  }

  .container { max-width: 900px; margin: 0 auto; }

  /* LOGIN */
  .login-box {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 50px 32px;
    text-align: center;
    border: 3px solid var(--accent2);
    max-width: 400px;
    margin: 60px auto;
  }

  .login-box h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.6rem;
    margin-bottom: 10px;
  }

  .login-box p {
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 28px;
    font-size: 0.95rem;
  }

  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #fff;
    border: 2.5px solid #e0e0e0;
    border-radius: 14px;
    padding: 14px 24px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    cursor: pointer;
    width: 100%;
    transition: box-shadow 0.2s, transform 0.15s;
    color: var(--text);
  }

  .btn-google:hover {
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    transform: translateY(-2px);
  }

  .btn-google img { width: 24px; height: 24px; }

  /* USUARIO LOGUEADO */
  .user-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .user-bar img {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--accent2);
  }

  .user-name {
    font-weight: 800;
    font-size: 0.95rem;
  }

  .btn-logout {
    background: #f0f0f0;
    border: none;
    border-radius: 10px;
    padding: 7px 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 0.85rem;
    cursor: pointer;
    color: var(--muted);
    transition: background 0.15s;
  }
  .btn-logout:hover { background: #ffe0e0; color: var(--accent); }

  .top-panel {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 32px;
    margin-bottom: 30px;
    border: 3px solid var(--accent2);
  }

  .top-panel h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--text);
    margin-bottom: 18px;
  }

  .input-row {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-width: 140px;
  }

  label {
    font-size: 0.82rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
  }

  input[type="text"], input[type="number"] {
    padding: 11px 14px;
    border: 2.5px solid #e8e8e8;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    outline: none;
    transition: border-color 0.2s;
    background: #fafafa;
    color: var(--text);
  }

  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--accent4);
    background: #fff;
  }

  .btn {
    padding: 12px 22px;
    border: none;
    border-radius: 14px;
    font-family: 'Fredoka One', cursive;
    font-size: 1rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.5px;
  }

  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.13); }
  .btn:active { transform: translateY(0); }
  .btn-primary { background: var(--accent4); color: #fff; }
  .btn-danger  { background: var(--accent);  color: #fff; }

  .total-box {
    background: linear-gradient(135deg, #ff6b6b, #ff8e53);
    color: #fff;
    border-radius: var(--radius);
    padding: 22px 32px;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 8px 24px rgba(255,107,107,0.35);
    flex-wrap: wrap;
    gap: 12px;
  }

  .total-box .label { font-family: 'Fredoka One', cursive; font-size: 1.1rem; opacity: 0.9; }
  .total-box .amount { font-family: 'Fredoka One', cursive; font-size: 2.4rem; }
  .total-box .per-person { font-size: 0.9rem; opacity: 0.85; font-weight: 700; }

  .people-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 22px;
    margin-bottom: 30px;
  }

  .person-card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px 18px 18px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    position: relative;
    border: 3px solid transparent;
    transition: border-color 0.2s, transform 0.2s;
    animation: popIn 0.35s cubic-bezier(.175,.885,.32,1.275);
  }

  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .person-card:hover { transform: translateY(-4px); border-color: var(--accent2); }

  .stickman-wrap {
    position: relative;
    width: 100px;
    height: 160px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .stickman-wrap:hover .avatar-hint { opacity: 1; }

  .face-circle {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 60px; height: 60px;
    border-radius: 50%;
    overflow: hidden;
    border: 3.5px solid var(--accent2);
    background: #f0f0f0;
    z-index: 2;
    transition: border-color 0.2s;
  }

  .stickman-wrap:hover .face-circle { border-color: var(--accent4); }

  .face-circle img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  .face-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.8rem;
  }

  .stickman-svg {
    position: absolute;
    top: 52px; left: 50%;
    transform: translateX(-50%);
    width: 90px; height: 110px;
  }

  .avatar-hint {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.5);
    color: #fff;
    font-size: 0.6rem;
    font-weight: 800;
    text-align: center;
    padding: 3px 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 0 0 8px 8px;
  }

  .hidden-input { display: none; }

  .person-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.15rem;
    color: var(--text);
    text-align: center;
    cursor: pointer;
    border-radius: 8px;
    padding: 2px 6px;
    transition: background 0.15s;
  }
  .person-name:hover { background: #fff5f5; }

  .person-amount {
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--accent4);
    font-family: 'Fredoka One', cursive;
    cursor: pointer;
    border-radius: 8px;
    padding: 2px 8px;
    transition: background 0.15s;
  }
  .person-amount:hover { background: #f0f7ff; }

  .person-extra {
    font-size: 0.78rem;
    color: var(--muted);
    font-weight: 700;
    text-align: center;
  }

  .delete-btn {
    position: absolute;
    top: 10px; right: 10px;
    background: #ffe0e0;
    border: none;
    border-radius: 50%;
    width: 26px; height: 26px;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--accent);
    font-weight: 800;
    transition: background 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .delete-btn:hover { background: var(--accent); color: #fff; }

  .color-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
  }

  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--muted);
    font-size: 1rem;
    font-weight: 700;
  }
  .empty-state .emoji { font-size: 3rem; display: block; margin-bottom: 10px; }

  .summary-box {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 32px;
    border: 3px solid var(--accent3);
  }
  .summary-box h2 {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    margin-bottom: 18px;
    color: var(--text);
  }

  .summary-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 2px dashed #f0f0f0;
    font-weight: 700;
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-name { display: flex; align-items: center; gap: 8px; font-size: 1rem; }
  .summary-val  { font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: var(--accent4); }

  .saved-badge {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--accent3);
    color: #fff;
    font-family: 'Fredoka One', cursive;
    font-size: 0.95rem;
    padding: 10px 20px;
    border-radius: 50px;
    box-shadow: 0 4px 16px rgba(107,203,119,0.4);
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .saved-badge.show { opacity: 1; transform: translateY(0); }

  .reset-btn-wrap { text-align: center; margin-top: 24px; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    h1 { font-size: 2rem; }
    .top-panel { padding: 20px; }
    .total-box { flex-direction: column; text-align: center; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>💸 Dividir Gastos</h1>
  <p class="subtitle">Agregá personas, subí fotos y dividí fácil</p>
  <div id="app"><div class="loading">Cargando... ⏳</div></div>
</div>

<div class="saved-badge" id="savedBadge">✅ Guardado</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ── TU CONFIGURACIÓN DE FIREBASE ──
  const firebaseConfig = {
    apiKey: "AIzaSyBsH-vABIi1YskINQD3LI_hXmM6jE0MKLY",
    authDomain: "pagina-para-dividir-gas.firebaseapp.com",
    projectId: "pagina-para-dividir-gas",
    storageBucket: "pagina-para-dividir-gas.firebasestorage.app",
    messagingSenderId: "497709394928",
    appId: "1:497709394928:web:b5c135eae219590ded0b35",
    measurementId: "G-5WZ9QMW8G7"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const COLORS = ['#4d96ff','#ff6b6b','#6bcb77','#ffd93d','#c77dff','#ff9f43','#48dbfb','#ff6eb4'];
  let people = [];
  let currentUser = null;

  // ── FIRESTORE ──
  async function cargarDeFirestore() {
    const ref = doc(db, 'usuarios', currentUser.uid);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      people = snap.data().people || [];
    } else {
      people = [];
    }
    renderAll();
  }

  async function guardarEnFirestore() {
    const ref = doc(db, 'usuarios', currentUser.uid);
    await setDoc(ref, { people });
    mostrarBadge();
  }

  // ── AUTH ──
  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      cargarDeFirestore();
    } else {
      renderLogin();
    }
  });

  function loginConGoogle() {
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider).catch(err => {
      alert('Error al iniciar sesión: ' + err.message);
    });
  }

  function cerrarSesion() {
    signOut(auth);
  }

  // ── UI ──
  function mostrarBadge() {
    const badge = document.getElementById('savedBadge');
    badge.classList.add('show');
    setTimeout(() => badge.classList.remove('show'), 2000);
  }

  function renderLogin() {
    document.getElementById('app').innerHTML = `
      <div class="login-box">
        <h2>👋 Bienvenido!</h2>
        <p>Iniciá sesión para guardar y ver tus gastos</p>
        <button class="btn-google" id="btnGoogle">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
          Continuar con Google
        </button>
      </div>`;
    document.getElementById('btnGoogle').addEventListener('click', loginConGoogle);
  }

  function agregarPersona() {
    const nombre = document.getElementById('inputNombre').value.trim();
    const monto  = parseFloat(document.getElementById('inputMonto').value) || 0;
    if (!nombre) { alert('¡Escribí un nombre!'); return; }
    people.push({ id: Date.now(), nombre, monto, foto: null, color: COLORS[people.length % COLORS.length] });
    document.getElementById('inputNombre').value = '';
    document.getElementById('inputMonto').value  = '';
    guardarEnFirestore();
    renderAll();
  }

  function eliminarPersona(id) {
    people = people.filter(p => p.id !== id);
    guardarEnFirestore();
    renderAll();
  }

  function abrirFoto(id) {
    document.getElementById('file-' + id).click();
  }

  function cargarFoto(id, input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const p = people.find(x => x.id === id);
      if (p) { p.foto = e.target.result; guardarEnFirestore(); renderAll(); }
    };
    reader.readAsDataURL(file);
  }

  function editarMonto(id, el) {
    if (el.querySelector('input')) return;
    const p = people.find(x => x.id === id);
    const input = document.createElement('input');
    input.type = 'number'; input.value = p.monto; input.min = '0'; input.step = '0.01';
    input.style.cssText = 'width:110px;padding:6px 10px;border:2.5px solid var(--accent4);border-radius:10px;font-family:Fredoka One,cursive;font-size:1.1rem;color:var(--accent4);text-align:center;outline:none;background:#f0f7ff;';
    el.innerHTML = ''; el.appendChild(input); input.focus(); input.select();
    const confirmar = () => {
      const nuevo = parseFloat(input.value);
      if (!isNaN(nuevo) && nuevo >= 0) p.monto = nuevo;
      guardarEnFirestore(); renderAll();
    };
    input.addEventListener('blur', confirmar);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); confirmar(); }
      if (e.key === 'Escape') renderAll();
    });
  }

  function editarNombre(id, el) {
    if (el.querySelector('input')) return;
    const p = people.find(x => x.id === id);
    const input = document.createElement('input');
    input.type = 'text'; input.value = p.nombre;
    input.style.cssText = 'width:130px;padding:6px 10px;border:2.5px solid var(--accent);border-radius:10px;font-family:Fredoka One,cursive;font-size:1rem;color:var(--text);text-align:center;outline:none;background:#fff5f5;';
    el.innerHTML = ''; el.appendChild(input); input.focus(); input.select();
    const confirmar = () => {
      const nuevo = input.value.trim();
      if (nuevo) p.nombre = nuevo;
      guardarEnFirestore(); renderAll();
    };
    input.addEventListener('blur', confirmar);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); confirmar(); }
      if (e.key === 'Escape') renderAll();
    });
  }

  async function resetearTodo() {
    if (!confirm('¿Seguro que querés borrar todo y empezar de cero?')) return;
    people = [];
    await guardarEnFirestore();
    renderAll();
  }

  function stickmanHTML(p) {
    const c = p.color;
    const fotoContent = p.foto
      ? `<img src="${p.foto}" alt="${p.nombre}">`
      : `<div class="face-placeholder">🙂</div>`;
    return `
      <div class="stickman-wrap" onclick="abrirFoto(${p.id})" title="Clic para subir foto">
        <div class="face-circle">${fotoContent}</div>
        <svg class="stickman-svg" viewBox="0 0 90 110" xmlns="http://www.w3.org/2000/svg">
          <line x1="45" y1="0"  x2="45" y2="12" stroke="${c}" stroke-width="4" stroke-linecap="round"/>
          <line x1="45" y1="12" x2="45" y2="60" stroke="${c}" stroke-width="4" stroke-linecap="round"/>
          <line x1="45" y1="22" x2="15" y2="45" stroke="${c}" stroke-width="4" stroke-linecap="round"/>
          <line x1="45" y1="22" x2="75" y2="45" stroke="${c}" stroke-width="4" stroke-linecap="round"/>
          <line x1="45" y1="60" x2="22" y2="95" stroke="${c}" stroke-width="4" stroke-linecap="round"/>
          <line x1="45" y1="60" x2="68" y2="95" stroke="${c}" stroke-width="4" stroke-linecap="round"/>
          <line x1="22" y1="95" x2="10" y2="100" stroke="${c}" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="68" y1="95" x2="80" y2="100" stroke="${c}" stroke-width="3.5" stroke-linecap="round"/>
        </svg>
        <div class="avatar-hint">📷 Subir foto</div>
        <input type="file" id="file-${p.id}" class="hidden-input" accept="image/*"
               onchange="cargarFoto(${p.id}, this)">
      </div>`;
  }

  function formatMoney(n) {
    return '$' + n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function renderAll() {
    const total     = people.reduce((s, p) => s + p.monto, 0);
    const porPerson = people.length ? total / people.length : 0;

    const userBar = `
      <div class="user-bar">
        <img src="${currentUser.photoURL}" alt="${currentUser.displayName}">
        <span class="user-name">${currentUser.displayName}</span>
        <button class="btn-logout" id="btnLogout">Salir</button>
      </div>`;

    const totalBox = people.length > 0 ? `
      <div class="total-box">
        <div>
          <div class="label">Total gastado</div>
          <div class="per-person">${people.length > 1 ? `Corresponde ${formatMoney(porPerson)} por persona` : '1 persona'}</div>
        </div>
        <div class="amount">${formatMoney(total)}</div>
      </div>` : '';

    const cards = people.length === 0
      ? `<div class="empty-state"><span class="emoji">🙈</span>Todavía no hay nadie. ¡Agregá la primera persona!</div>`
      : people.map(p => {
          const dif = p.monto - porPerson;
          const difLabel = dif > 0
            ? `<span style="color:var(--accent3)">Pone de más: ${formatMoney(dif)}</span>`
            : dif < 0
            ? `<span style="color:var(--accent)">Le falta: ${formatMoney(Math.abs(dif))}</span>`
            : `<span style="color:var(--muted)">Está justo ✓</span>`;
          return `
            <div class="person-card">
              <button class="delete-btn" data-id="${p.id}">✕</button>
              ${stickmanHTML(p)}
              <div class="person-name" data-edit-nombre="${p.id}">${p.nombre} ✏️</div>
              <div class="person-amount" data-edit-monto="${p.id}">${formatMoney(p.monto)} ✏️</div>
              <div class="person-extra">${difLabel}</div>
            </div>`;
        }).join('');

    const summary = people.length > 0 ? `
      <div class="summary-box">
        <h2>📋 Resumen</h2>
        ${people.map(p => {
          const dif = p.monto - porPerson;
          const accion = dif > 0 ? `le deben ${formatMoney(dif)}` : dif < 0 ? `debe ${formatMoney(Math.abs(dif))}` : `está al día ✓`;
          return `<div class="summary-row">
            <div class="summary-name"><span class="color-dot" style="background:${p.color}"></span>${p.nombre}</div>
            <div style="text-align:right">
              <div class="summary-val">${formatMoney(p.monto)}</div>
              <div style="font-size:0.78rem;color:var(--muted);font-weight:700">${accion}</div>
            </div>
          </div>`;
        }).join('')}
        <div class="summary-row" style="margin-top:10px">
          <div class="summary-name" style="font-family:'Fredoka One',cursive">🧾 Total</div>
          <div class="summary-val">${formatMoney(total)}</div>
        </div>
        ${people.length > 1 ? `<div class="summary-row">
          <div class="summary-name" style="font-family:'Fredoka One',cursive">👤 Por persona</div>
          <div class="summary-val">${formatMoney(porPerson)}</div>
        </div>` : ''}
      </div>` : '';

    const resetBtn = people.length > 0
      ? `<div class="reset-btn-wrap"><button class="btn btn-danger" id="btnReset">🗑️ Borrar todo y empezar de cero</button></div>`
      : '';

    document.getElementById('app').innerHTML = `
      ${userBar}
      <div class="top-panel">
        <h2>➕ Agregar persona y gasto</h2>
        <div class="input-row">
          <div class="input-group">
            <label>Nombre</label>
            <input type="text" id="inputNombre" placeholder="Ej: Martín" />
          </div>
          <div class="input-group" style="max-width:180px">
            <label>Lo que gastó ($)</label>
            <input type="number" id="inputMonto" placeholder="0.00" min="0" step="0.01" />
          </div>
          <button class="btn btn-primary" id="btnAgregar">Agregar</button>
        </div>
      </div>
      ${totalBox}
      <div class="people-grid">${cards}</div>
      ${summary}
      ${resetBtn}
    `;

    // Eventos
    document.getElementById('btnLogout').addEventListener('click', cerrarSesion);
    document.getElementById('btnAgregar').addEventListener('click', agregarPersona);
    if (people.length > 0) {
      document.getElementById('btnReset')?.addEventListener('click', resetearTodo);
    }

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', () => eliminarPersona(Number(btn.dataset.id)));
    });

    document.querySelectorAll('[data-edit-monto]').forEach(el => {
      el.addEventListener('click', () => editarMonto(Number(el.dataset.editMonto), el));
    });

    document.querySelectorAll('[data-edit-nombre]').forEach(el => {
      el.addEventListener('click', () => editarNombre(Number(el.dataset.editNombre), el));
    });

    document.getElementById('inputNombre')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') agregarPersona();
    });
    document.getElementById('inputMonto')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') agregarPersona();
    });
  }

  // Exponer funciones necesarias para los onchange del input file
  window.abrirFoto = abrirFoto;
  window.cargarFoto = cargarFoto;
</script>
</body>
</html>
